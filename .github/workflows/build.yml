name: Build desktop app

# Triggers:
#   - push of a v*.*.* tag → cuts a release-shaped build
#   - manual dispatch → for ad-hoc test builds
#   - pull request → builds (but does not publish) so the workflow stays green
on:
  push:
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main]
  workflow_dispatch:

# Avoid concurrent runs of the same ref overlapping each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt every job into the Node 24 runtime for JS-based actions ahead of
# GitHub flipping the default in June 2026. Silences the deprecation
# warnings against checkout/setup-node/upload-artifact.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build for ${{ matrix.os-label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            os-label: macOS (arm64)
            artifact-glob: "release/*.dmg"
            artifact-name: reckon-macos-arm64
          - os: windows-latest
            os-label: Windows (x64)
            artifact-glob: "release/*.exe"
            artifact-name: reckon-windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build distributable
        # electron-builder reads the `build` block in package.json. The
        # mac job emits a dmg (arm64), the win job emits an nsis exe.
        # `--publish never` is critical on tag pushes: the matrix build
        # job is intentionally artifact-producing only, and a dedicated
        # `release` job below attaches assets via softprops. Without it,
        # electron-builder auto-detects the tag and tries to publish
        # using GITHUB_TOKEN, which the build job lacks `contents:write`
        # permission for — yielding 403s on the runner that wins the race.
        run: npm run electron:build && npx electron-builder --publish never
        env:
          # Skip notarisation on macOS until an Apple Developer ID is wired in.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error
          retention-days: 30

  release:
    name: Attach builds to GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v5
        with:
          name: reckon-macos-arm64
          path: dist/macos
      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: reckon-windows-x64
          path: dist/windows
      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/macos/*
            dist/windows/*
          generate_release_notes: true
